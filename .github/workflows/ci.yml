name: CI

on:
  push:
  pull_request:
  # Cirrus marked a number of tasks `trigger_type: manual`. Those are mapped
  # onto the workflow_dispatch event so they can be started by hand from the
  # Actions UI ("Run workflow") instead of running on every push.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel in-progress runs on master, so every commit is fully tested.
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  DEBIAN_FRONTEND: noninteractive
  LANG: C

jobs:
  format-check:
    name: Formatting & linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake curl gcc g++ git make
          pip install -r dev_requirements.txt
      # `make format-check` compiles uncrustify from source, which takes a
      # while. Cache the resulting binary keyed on the pinned version so it is
      # only rebuilt when we bump UNCRUSTIFY_VERSION in the Makefile.
      - name: Cache uncrustify
        uses: actions/cache@v4
        with:
          path: uncrustify
          key: uncrustify-0.77.1-${{ runner.os }}
      - name: Run checks
        run: |
          touch config.mak # Pretend that ./configure has run
          make format-check
          make lint

  # Build the matrix for the `linux` job. On a normal push/PR only the core
  # entries run; a manual workflow_dispatch run additionally includes the
  # builds Cirrus used to gate behind `trigger_type: manual`. Emitting JSON
  # here (rather than two near-identical jobs) keeps the build/test steps
  # defined exactly once.
  setup:
    name: Determine Linux matrix
    runs-on: ubuntu-latest
    outputs:
      linux_matrix: ${{ steps.set.outputs.linux_matrix }}
    env:
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - id: set
        run: |
          core='{"name":"cares-pam-ldap","runner":"ubuntu-22.04","pgversion":"16","configure_args":"--with-cares --with-pam --with-ldap","cflags":"","enable_valgrind":"","scan_build":"","dist":"yes"},{"name":"no-evdns-no-openssl","runner":"ubuntu-22.04","pgversion":"16","configure_args":"--disable-evdns --without-openssl","cflags":"","enable_valgrind":"","scan_build":"","dist":""},{"name":"valgrind","runner":"ubuntu-22.04","pgversion":"17","configure_args":"","cflags":"-O0 -g","enable_valgrind":"yes","scan_build":"","dist":""}'
          extra='{"name":"plain","runner":"ubuntu-22.04","pgversion":"16","configure_args":"","cflags":"","enable_valgrind":"","scan_build":"","dist":""},{"name":"ubsan","runner":"ubuntu-22.04","pgversion":"16","configure_args":"","cflags":"-fno-sanitize-recover=all -fsanitize=undefined -fsanitize-address-use-after-scope -fno-sanitize=shift","enable_valgrind":"","scan_build":"","dist":""},{"name":"scan-build","runner":"ubuntu-22.04","pgversion":"16","configure_args":"","cflags":"","enable_valgrind":"","scan_build":"yes","dist":""},{"name":"arm","runner":"ubuntu-24.04-arm","pgversion":"16","configure_args":"","cflags":"","enable_valgrind":"","scan_build":"","dist":""},{"name":"ubuntu-2404","runner":"ubuntu-24.04","pgversion":"16","configure_args":"","cflags":"","enable_valgrind":"","scan_build":"","dist":""}'
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            include="$core,$extra"
          else
            include="$core"
          fi
          echo "linux_matrix={\"include\":[$include]}" >> "$GITHUB_OUTPUT"

  # Builds and tests on native GitHub-hosted Ubuntu runners. These run as the
  # unprivileged `runner` user, so unlike the Cirrus containers there is no
  # need to create a separate user and su into it.
  linux:
    name: Linux (${{ matrix.name }})
    needs: setup
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.linux_matrix) }}
    env:
      PGVERSION: ${{ matrix.pgversion }}
      configure_args: ${{ matrix.configure_args }}
      # Only entries that explicitly set `cflags` override CFLAGS; the rest
      # inherit configure's defaults. CFLAGS_OVERRIDE is exported into the real
      # CFLAGS in the build step only when non-empty, so we don't accidentally
      # blank out the default optimization flags.
      CFLAGS_OVERRIDE: ${{ matrix.cflags }}
      ENABLE_VALGRIND: ${{ matrix.enable_valgrind }}
      USE_SCAN_BUILD: ${{ matrix.scan_build }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get -y --no-install-recommends install gnupg postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update
          pkgs="autoconf automake ca-certificates cpio git iptables ldap-utils libc-ares-dev libevent-dev libldap-dev libpam0g-dev libssl-dev libsystemd-dev libtool make pandoc pkg-config postgresql-$PGVERSION python3 python3-pip python3-venv slapd socat sudo"
          if [ "$ENABLE_VALGRIND" = "yes" ]; then pkgs="$pkgs valgrind"; fi
          if [ "$USE_SCAN_BUILD" = "yes" ]; then pkgs="$pkgs clang clang-tools"; fi
          # $pkgs is an intentionally word-split package list.
          # shellcheck disable=SC2086
          sudo apt-get -y --no-install-recommends install $pkgs
          python3 -m venv "$HOME/venv"
          "$HOME/venv/bin/pip" install -r requirements.txt
      - name: Build
        run: |
          set -e
          [ -n "$CFLAGS_OVERRIDE" ] && export CFLAGS="$CFLAGS_OVERRIDE"
          ./autogen.sh
          # $configure_args and the optional scan-build prefix are meant to
          # word-split.
          # shellcheck disable=SC2086
          ${USE_SCAN_BUILD:+scan-build} ./configure --prefix="$HOME/install" --enable-cassert --enable-werror --without-cares --with-systemd $configure_args
          # shellcheck disable=SC2086
          ${USE_SCAN_BUILD:+scan-build} make -j4
      - name: Test
        run: |
          set -e
          # shellcheck disable=SC1091
          source "$HOME/venv/bin/activate"
          PATH="/usr/lib/postgresql/$PGVERSION/bin:$PATH" make -j4 check CONCURRENCY=4
      - name: Install
        run: make -j4 install
      # Verify the dist tarball builds from a clean checkout, like Cirrus did.
      # Only needs to run once, so it is gated on the `dist` matrix flag.
      - name: Build distribution tarball
        if: ${{ matrix.dist == 'yes' }}
        run: |
          set -e
          make dist
          PACKAGE_VERSION=$(sed -n 's/PACKAGE_VERSION = //p' config.mak)
          tar -x -v -f "pgbouncer-${PACKAGE_VERSION}.tar.gz"
          cd "pgbouncer-${PACKAGE_VERSION}/"
          # shellcheck disable=SC2086
          ./configure --prefix="$HOME/install2" --enable-werror --without-cares $configure_args
          make -j4
          make -j4 install
      - name: Upload tarball
        if: ${{ matrix.dist == 'yes' }}
        uses: actions/upload-artifact@v4
        with:
          name: pgbouncer-tarball
          path: pgbouncer-*.tar.gz
          if-no-files-found: ignore
      - name: Upload config.log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: config-log-${{ matrix.name }}
          path: config.log
          if-no-files-found: ignore

  # Distributions that have no native GitHub-hosted runner, run inside their
  # official container images. These run as root, where PostgreSQL refuses to
  # initdb, so we keep Cirrus' pattern of building/testing as an unprivileged
  # `user`. Alpine is handled in a separate job because its musl libc can't run
  # the glibc node binary that GitHub uses for JavaScript actions.
  linux-container:
    name: Linux (${{ matrix.name }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-bookworm
            image: debian:bookworm
            family: debian
            pgversion: "15"
            configure_args: ""
          - name: debian-bullseye
            image: debian:bullseye
            family: debian
            pgversion: "13"
            configure_args: ""
          - name: rocky-9
            image: rockylinux:9
            family: redhat
            pgversion: ""
            configure_args: --with-cares
          - name: rocky-8
            image: rockylinux:8
            family: redhat
            pgversion: ""
            configure_args: ""
    env:
      PGVERSION: ${{ matrix.pgversion }}
      configure_args: ${{ matrix.configure_args }}
      family: ${{ matrix.family }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          set -e
          case "$family" in
          debian)
            apt-get update
            apt-get -y --no-install-recommends install gnupg postgresql-common
            /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
            apt-get update
            apt-get -y --no-install-recommends install autoconf automake ca-certificates cpio git iptables ldap-utils libc-ares-dev libevent-dev libldap-dev libpam0g-dev libssl-dev libsystemd-dev libtool make pandoc pkg-config "postgresql-$PGVERSION" python3 python3-pip python3-venv slapd socat sudo
            python3 -m venv /venv
            /venv/bin/pip install -r requirements.txt
            useradd user
            ;;
          redhat)
            dnf -y install 'dnf-command(config-manager)'
            if grep -q -F 'release 9' /etc/redhat-release; then dnf config-manager --set-enabled "plus"; else dnf config-manager --set-enabled "powertools"; fi
            dnf -y install autoconf automake diffutils file iptables libevent-devel libpq-devel libtool make openldap-clients openldap-devel openldap-servers openssl-devel pam-devel pkg-config postgresql-server postgresql-contrib python3 python3-pip socat sudo systemd-devel wget
            case "$configure_args" in *with-cares*) dnf -y install c-ares-devel;; esac
            wget -O /tmp/pandoc.tar.gz https://github.com/jgm/pandoc/releases/download/2.10.1/pandoc-2.10.1-linux-amd64.tar.gz
            tar xvzf /tmp/pandoc.tar.gz --strip-components 1 -C /usr/local/
            if grep -q -F 'release 9' /etc/redhat-release; then dnf -y install python-unversioned-command; else dnf -y install python39 python39-pip && alternatives --set python /usr/bin/python3.9; fi
            python -m pip install -r requirements.txt
            useradd user
            ;;
          esac
          chown -R user .
          echo 'user ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
      - name: Build
        run: |
          set -e
          case "$family" in
            debian) baseline="--without-cares --with-systemd" ;;
            redhat) baseline="--with-ldap --with-pam --with-systemd" ;;
          esac
          su user -c "./autogen.sh"
          # $baseline and $configure_args are meant to word-split inside the
          # quoted su command.
          su user -c "./configure --prefix=\$HOME/install --enable-cassert --enable-werror $baseline $configure_args"
          su user -c "make -j4"
      - name: Test
        run: |
          set -e
          case "$family" in
            debian) su user -c "PATH=/usr/lib/postgresql/$PGVERSION/bin:/venv/bin:\$PATH make -j4 check CONCURRENCY=4" ;;
            redhat) su user -c "make -j4 check CONCURRENCY=4" ;;
          esac
      - name: Install
        run: su user -c "make -j4 install"
      - name: Upload config.log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: config-log-${{ matrix.name }}
          path: config.log
          if-no-files-found: ignore

  # Alpine via a chroot on an Ubuntu runner (see comment on linux-container for
  # why it can't use the container: mechanism).
  alpine:
    name: Linux (alpine)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jirutka/setup-alpine@v1
        with:
          packages: >-
            autoconf automake build-base c-ares-dev iptables libevent-dev libtool
            openldap openldap-clients openldap-dev openssl openssl-dev pkgconf
            postgresql postgresql-contrib python3 py3-pip socat sudo wget
      - name: Build and test
        shell: alpine.sh --root {0}
        run: |
          set -e
          wget -O /tmp/pandoc.tar.gz https://github.com/jgm/pandoc/releases/download/2.10.1/pandoc-2.10.1-linux-amd64.tar.gz
          tar xzf /tmp/pandoc.tar.gz --strip-components 1 -C /usr/local/
          python3 -m venv /venv
          /venv/bin/pip install -r requirements.txt
          adduser --disabled-password user
          chown -R user .
          echo 'user ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          su user -c "./autogen.sh"
          su user -c "./configure --prefix=\$HOME/install --enable-cassert --enable-werror --with-cares --with-ldap"
          su user -c "make -j4"
          su user -c "PATH=/venv/bin:\$PATH make -j4 check CONCURRENCY=4"
          su user -c "make -j4 install"

  macos:
    name: macOS
    runs-on: macos-15
    env:
      HAVE_IPV6_LOCALHOST: "yes"
      USE_SUDO: "true"
      PGVERSION: "16"
      CPPFLAGS: -I/opt/homebrew/opt/openldap/include -I/opt/homebrew/opt/openssl@3/include
      LDFLAGS: -L/opt/homebrew/opt/openldap/lib -L/opt/homebrew/opt/openssl@3/lib
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          set -e
          brew install autoconf automake libevent libtool openldap openssl pandoc pkg-config "postgresql@$PGVERSION"
          python3 -m venv venv
          venv/bin/pip install -r requirements.txt
          # Allow the test suite to install its packet-filter anchor.
          echo 'anchor "pgbouncer_test/*"' | sudo tee -a /etc/pf.conf
          sudo pfctl -f /etc/pf.conf
      - name: Build
        run: |
          set -e
          export PATH="/opt/homebrew/opt/postgresql@$PGVERSION/bin:$PATH"
          ./autogen.sh
          ./configure --prefix="$HOME/install" --enable-werror --with-ldap
          make -j4
      - name: Test
        run: |
          set -e
          # shellcheck disable=SC1091
          source venv/bin/activate
          export PATH="/opt/homebrew/opt/postgresql@$PGVERSION/bin:$PATH"
          make -j4 check CONCURRENCY=4
      - name: Install
        run: make -j4 install
      - name: Upload config.log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: config-log-macos
          path: config.log
          if-no-files-found: ignore

  windows:
    name: Windows
    runs-on: windows-2022
    env:
      HAVE_IPV6_LOCALHOST: "yes"
    steps:
      - uses: actions/checkout@v4
      - name: Install pandoc
        shell: pwsh
        run: choco install -y --no-progress pandoc
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-postgresql
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            autoconf automake libtool pkg-config zip
      - name: Configure hosts file
        shell: pwsh
        run: Add-Content c:\Windows\System32\Drivers\etc\hosts "127.0.0.1 localhost"
      - name: Install Python dependencies
        shell: msys2 {0}
        run: |
          echo "127.0.0.1   localhost" >> /etc/hosts
          pip install -r requirements.txt
      - name: Build
        shell: msys2 {0}
        run: |
          ./autogen.sh
          ./configure --prefix="$(pwd)/install" --enable-werror PANDOC=/c/programdata/chocolatey/bin/pandoc LDFLAGS=-static "LIBS=-liphlpapi $(pkgconf --libs --static openssl)" PKG_CONFIG='pkg-config --static'
          make -j4
      - name: Test
        shell: msys2 {0}
        run: |
          make -j4 check CONCURRENCY=3
          windres pgbouncer.exe
      - name: Build zip
        shell: msys2 {0}
        run: make -j4 zip
      - name: Upload zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pgbouncer-windows-zip
          path: pgbouncer-*.zip
          if-no-files-found: ignore
      - name: Upload config.log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: config-log-windows
          path: config.log
          if-no-files-found: ignore
